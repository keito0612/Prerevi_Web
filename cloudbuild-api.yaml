# ===========================================
# Cloud Build configuration for Laravel API
# ===========================================
# Deploy command:
# gcloud builds submit --config cloudbuild-api.yaml
#
# Required environment variables:
# - APP_KEY: Laravel application key
# - DB_URL, DB_AUTH_TOKEN: Turso database credentials
# - CLOUDFLARE_R2_*: Cloudflare R2 storage credentials
# - RESEND_API_KEY: Resend email API key
# - GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET: Google OAuth
# - FRONTEND_URL: Next.js frontend URL

steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/prerebi-api:$BUILD_ID'
      - '-t'
      - 'gcr.io/$PROJECT_ID/prerebi-api:latest'
      - '-f'
      - 'docker/php/Dockerfile.prod'
      - '.'

  # Push the Docker image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/prerebi-api:$BUILD_ID'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/prerebi-api:latest'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'prerebi-api'
      - '--image'
      - 'gcr.io/$PROJECT_ID/prerebi-api:$BUILD_ID'
      - '--region'
      - 'asia-northeast1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '1Gi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '2'
      - '--port'
      - '8080'
      - '--set-env-vars'
      - 'APP_ENV=production,APP_DEBUG=false,LOG_CHANNEL=stderr,DB_CONNECTION=libsql,FILESYSTEM_DISK=r2,MAIL_MAILER=resend,TRUSTED_PROXIES=*'
      - '--set-secrets'
      - '/secrets/.env=prerebi_env:latest'

images:
  - 'gcr.io/$PROJECT_ID/prerebi-api:$BUILD_ID'
  - 'gcr.io/$PROJECT_ID/prerebi-api:latest'

options:
  logging: CLOUD_LOGGING_ONLY
